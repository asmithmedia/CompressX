services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: compressx
      POSTGRES_PASSWORD: compressx_dev
      POSTGRES_DB: compressx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compressx"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://compressx:compressx_dev@postgres:5432/compressx
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=compressx-models
      - INTERNAL_API_KEY=dev-internal-key-change-in-prod
      - HF_HOME=/tmp/hf_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ../backend:/app
      - hf_cache:/tmp/hf_cache

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1
    environment:
      - DATABASE_URL=postgresql://compressx:compressx_dev@postgres:5432/compressx
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=compressx-models
      - INTERNAL_API_KEY=dev-internal-key-change-in-prod
      - HF_HOME=/tmp/hf_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - hf_cache:/tmp/hf_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://compressx:compressx_dev@postgres:5432/compressx
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev-secret-change-in-prod-at-least-32-chars
      - COMPRESSION_API_URL=http://backend:8000
      - INTERNAL_API_KEY=dev-internal-key-change-in-prod
      - S3_ENDPOINT=http://minio:9000
      - S3_PUBLIC_ENDPOINT=http://localhost:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=compressx-models
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - backend

volumes:
  pgdata:
  miniodata:
  hf_cache:
