name: CLI CI

on:
  push:
    branches: [main]
    paths:
      - "compressx-cli/**"
      - ".github/workflows/cli-ci.yml"
  pull_request:
    paths:
      - "compressx-cli/**"
      - ".github/workflows/cli-ci.yml"

jobs:
  test:
    name: Test on ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20]
    defaults:
      run:
        working-directory: compressx-cli
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: compressx-cli/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test CLI
        run: node dist/compressx.js --version
