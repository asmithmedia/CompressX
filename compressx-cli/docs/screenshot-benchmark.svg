<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" font-family="'SF Mono','Cascadia Code','Consolas',monospace" font-size="13">
  <rect width="720" height="440" rx="10" fill="#0d1117"/>
  <rect width="720" height="36" rx="10" fill="#161b22"/>
  <rect y="26" width="720" height="10" fill="#161b22"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="360" y="22" text-anchor="middle" fill="#6e7681" font-size="12">compressx benchmark qwen3:4b</text>
  <!-- Header -->
  <text x="20" y="60" fill="#58a6ff" font-weight="bold">  CompressX Benchmark: qwen3:4b  vs  qwen3:4b-cx</text>
  <text x="20" y="76" fill="#6e7681">  ────────────────────────────────────────────────────</text>
  <!-- Table header -->
  <text x="20" y="100" fill="#6e7681">                    </text>
  <text x="180" y="100" fill="#e6edf3" font-weight="bold">Original</text>
  <text x="320" y="100" fill="#e6edf3" font-weight="bold">Compressed</text>
  <text x="470" y="100" fill="#e6edf3" font-weight="bold">Delta</text>
  <!-- Rows -->
  <text x="20" y="124" fill="#8b949e">  Size on disk</text>
  <text x="180" y="124" fill="#8b949e">8.10 GB</text>
  <text x="320" y="124" fill="#8b949e">2.60 GB</text>
  <text x="470" y="124" fill="#3fb950">-68%</text>

  <text x="20" y="148" fill="#8b949e">  Prompt eval</text>
  <text x="180" y="148" fill="#8b949e">142 tok/s</text>
  <text x="320" y="148" fill="#8b949e">187 tok/s</text>
  <text x="470" y="148" fill="#3fb950">+32%</text>

  <text x="20" y="172" fill="#8b949e">  Generation</text>
  <text x="180" y="172" fill="#8b949e">48 tok/s</text>
  <text x="320" y="172" fill="#8b949e">74 tok/s</text>
  <text x="470" y="172" fill="#3fb950">+54%</text>

  <text x="20" y="196" fill="#8b949e">  Perplexity</text>
  <text x="180" y="196" fill="#8b949e">7.42</text>
  <text x="320" y="196" fill="#8b949e">7.89</text>
  <text x="470" y="196" fill="#d29922">+6.3%</text>

  <text x="20" y="220" fill="#8b949e">  Prompt battery</text>
  <text x="180" y="220" fill="#8b949e">10/10 ok</text>
  <text x="320" y="220" fill="#8b949e">9/10 ok</text>
  <text x="470" y="220" fill="#d29922">1 diverged</text>

  <!-- Assessment -->
  <text x="20" y="258" fill="#8b949e">  Assessment: </text>
  <text x="130" y="258" fill="#58a6ff" font-weight="bold">Good — typical quantization trade-off</text>

  <text x="20" y="284" fill="#6e7681">    • Size reduced by 68%</text>
  <text x="20" y="304" fill="#6e7681">    • Perplexity delta of 6.3% — within expected range</text>
  <text x="20" y="324" fill="#6e7681">    • Generation speed up 54%</text>
  <text x="20" y="344" fill="#6e7681">    • Prompt battery: 9/10 match — minor divergence</text>

  <!-- Recommendation -->
  <text x="20" y="380" fill="#e6edf3" font-weight="bold">  Recommendation:</text>
  <text x="175" y="380" fill="#8b949e">Ship it unless quality-critical.</text>

  <!-- Tip -->
  <text x="20" y="416" fill="#6e7681">  Run with --fast to skip perplexity (~30 sec)</text>
</svg>
